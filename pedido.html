<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pedido | Takara 3D</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f3eadc;
      color: #1b140c;
      padding: 24px;
    }

    .page {
      max-width: 1100px;
      margin: auto;
    }

    h1 {
      font-family: Georgia, serif;
      font-size: 42px;
      margin-bottom: 8px;
    }

    .intro {
      color: #6b5a45;
      font-size: 18px;
      margin-bottom: 32px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 32px;
      align-items: start;
    }

    .panel {
      background: #fff8ee;
      border-radius: 22px;
      padding: 24px;
      box-shadow: 0 18px 45px rgba(54,35,16,.12);
    }

    label {
      display: block;
      font-weight: bold;
      margin: 18px 0 8px;
    }

    input, select {
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      border: 1px solid #d6c6ad;
      font-size: 16px;
      background: white;
    }

    .preview-wrap {
      display: flex;
      justify-content: center;
      padding: 30px;
      background: #17110a;
      border-radius: 24px;
    }

    .frame {
      width: 320px;
      height: 420px;
      padding: 24px;
      border-radius: 24px;
      background: #8a4f24;
      box-shadow: 0 25px 55px rgba(0,0,0,.45);
      transition: background .2s ease;
    }

    .photo {
      width: 100%;
      height: 100%;
      border-radius: 12px;
      background: #f7e9c8;
      overflow: hidden;
      box-shadow: inset 0 0 28px rgba(255,255,255,.9), 0 0 28px rgba(255,210,120,.65);
    }

    .photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: grayscale(1) sepia(.35) brightness(1.12) contrast(.92);
      opacity: .82;
    }

    .note {
      margin-top: 18px;
      font-size: 14px;
      color: #6b5a45;
      line-height: 1.45;
    }

    .back {
      display: inline-block;
      margin-bottom: 22px;
      color: #9b6a1f;
      font-weight: bold;
      text-decoration: none;
    }

    @media (max-width: 800px) {
      .grid {
        grid-template-columns: 1fr;
      }

      .frame {
        width: 260px;
        height: 350px;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <a class="back" href="index.html">← Volver a Takara 3D</a>

    <h1>Crea tu litofanía</h1>
    <p class="intro">Sube una foto, elige el color del marco y revisa una primera vista previa orientativa.</p>

    <section class="grid">
      <div class="panel">
        <h2>Configura tu marco</h2>

        <label for="photoInput">Sube tu foto</label>
        <input id="photoInput" type="file" accept="image/*">

        <label for="colorSelect">Color del marco</label>
        <select id="colorSelect">
          <option value="#8a4f24">Rosewood</option>
          <option value="#17110a">Ebony / negro</option>
          <option value="#e8d8bd">Polar claro</option>
          <option value="#b8783a">Madera cálida</option>
        </select>

        <p class="note">
          Esta vista previa es orientativa. Antes de fabricar revisaremos que la foto tenga buena calidad y contraste para litofanía.
        </p>
      </div>

      <div class="panel">
        <h2>Vista previa</h2>

        <div class="preview-wrap">
          <div id="frame" class="frame">
            <div class="photo">
              <img id="previewImage" alt="">
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script>
    const photoInput = document.getElementById("photoInput");
    const previewImage = document.getElementById("previewImage");
    const colorSelect = document.getElementById("colorSelect");
    const frame = document.getElementById("frame");

    photoInput.addEventListener("change", function () {
      const file = this.files && this.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function (event) {
        previewImage.src = event.target.result;
      };
      reader.readAsDataURL(file);
    });

    colorSelect.addEventListener("change", function () {
      frame.style.background = this.value;
    });
  </script>
</body>
</html>
