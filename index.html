<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Takara 3D</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: #f5f5f5;
      text-align: center;
      padding: 32px 18px;
    }
    .card {
      max-width: 430px;
      margin: auto;
      padding: 28px 20px;
      border-radius: 22px;
      background: #1b1b1b;
      box-shadow: 0 0 30px rgba(0,0,0,.35);
    }
    h1 {
      margin-bottom: 8px;
      font-size: 34px;
      letter-spacing: 1px;
    }
    p {
      color: #cfcfcf;
      line-height: 1.5;
    }
    .button {
      display: block;
      margin: 14px 0;
      padding: 16px;
      border-radius: 14px;
      background: #d6a85f;
      color: #111;
      text-decoration: none;
      font-weight: bold;
    }
    .button.secondary {
      background: #f1f1f1;
    }
    .footer {
      margin-top: 24px;
      font-size: 13px;
      color: #888;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Takara 3D</h1>
    <p>Detalles personalizados en impresión 3D. Litofanías, marcos luminosos y regalos únicos hechos por encargo.</p>

    <a class="button" href="https://www.instagram.com/" target="_blank">Ver Instagram</a>
    <a class="button secondary" href="https://forms.google.com/" target="_blank">Hacer pedido</a>
    <a class="button secondary" href="https://wa.me/34XXXXXXXXX" target="_blank">Contactar por WhatsApp</a>

    <p class="footer">Hecho con impresión 3D · Madrid</p>
  </main>
</body>
</html>
